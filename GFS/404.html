<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         META TAGS
    ========================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="404 Error Page - Good Service Finance Consultancy">

    <!-- =========================
         TITLE
    ========================== -->

    <title>

        404 Page Not Found |
        Good Service Finance Consultancy

    </title>

    <!-- =========================
         GOOGLE FONTS
    ========================== -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- =========================
         FONT AWESOME
    ========================== -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- =========================
         CSS
    ========================== -->

    <link rel="stylesheet"
        href="style.css">

    <link rel="stylesheet"
        href="animations.css">

    <!-- =========================
         FAVICON
    ========================== -->

    <link rel="icon"
        href="images/favicon.ico"
        type="image/x-icon">

    <!-- =========================
         INTERNAL STYLE
    ========================== -->

    <style>

        .error-page{

            width:100%;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px;

            background:
            linear-gradient(
                rgba(255,255,255,0.88),
                rgba(255,255,255,0.88)
            ),
            url('images/background.png')
            center/cover no-repeat;

        }

        .error-card{

            width:100%;
            max-width:700px;

            background:white;

            padding:60px 40px;

            border-radius:35px;

            text-align:center;

            box-shadow:
            0 15px 45px rgba(0,0,0,0.1);

        }

        .error-card h1{

            font-size:120px;

            color:#0066cc;

            margin-bottom:10px;

            line-height:1;

        }

        .error-card h2{

            font-size:36px;

            color:#003b7a;

            margin-bottom:20px;

        }

        .error-card p{

            color:#666;

            line-height:1.9;

            margin-bottom:35px;

            font-size:17px;

        }

        .error-btn{

            display:inline-block;

            padding:16px 34px;

            border-radius:15px;

            text-decoration:none;

            background:
            linear-gradient(
                135deg,
                #0066cc,
                #0099ff
            );

            color:white;

            font-weight:600;

            font-size:16px;

        }

        .error-btn:hover{

            transform:
            translateY(-5px);

        }

        .error-icon{

            font-size:70px;

            color:#0099ff;

            margin-bottom:20px;

        }

        @media(max-width:768px){

            .error-card{

                padding:45px 25px;

            }

            .error-card h1{

                font-size:90px;

            }

            .error-card h2{

                font-size:28px;

            }

        }

    </style>

</head>

<body>

    <!-- =========================
         ERROR PAGE
    ========================== -->

    <section class="error-page">

        <div class="error-card reveal active">

            <!-- ICON -->

            <div class="error-icon">

                <i class="fa-solid fa-circle-exclamation"></i>

            </div>

            <!-- ERROR CODE -->

            <h1>

                404

            </h1>

            <!-- TITLE -->

            <h2>

                Page Not Found

            </h2>

            <!-- DESCRIPTION -->

            <p>

                Sorry, the page you are looking for
                does not exist or may have been moved.
                Please return to the homepage.

            </p>

            <!-- BUTTON -->

            <a href="home.html"
                class="error-btn">

                Back To Home

            </a>

        </div>

    </section>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script src="script.js"></script>

</body>

</html>
